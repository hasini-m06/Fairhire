<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>FairHire | Global AI Bias Auditor</title>
    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-[#0f172a] text-slate-200 font-mono p-6 md:p-12">
    <header class="max-w-5xl mx-auto mb-12 flex justify-between items-end border-b border-slate-800 pb-6">
        <div>
            <h1 class="text-4xl font-black tracking-tighter text-white uppercase">FairHire <span
                    class="text-blue-500">Audit_v1.0</span></h1>
            <p class="text-slate-500 text-sm mt-2">Global Algorithmic Transparency Engine • Powered by Gemini 1.5 Pro
            </p>
        </div>
        <div class="text-right text-xs text-slate-600 hidden md:block">
            STATUS: SYSTEM_READY<br>LOCATION: GLOBAL_EDGE
        </div>
    </header>

    <main class="max-w-5xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-8">
        <section class="lg:col-span-1 space-y-6">
            <div class="bg-[#1e293b] p-6 rounded-sm border border-slate-800">
                <h2 class="text-blue-500 font-bold mb-4 uppercase text-xs">Terminal_Input</h2>
                <input type="file" id="csvFile" accept=".csv"
                    class="text-xs text-slate-400 file:bg-slate-700 file:text-white file:border-0 file:px-3 file:py-1 file:rounded-sm file:mr-4 cursor-pointer w-full">
                <button id="auditBtn"
                    class="mt-6 w-full bg-blue-600 hover:bg-blue-500 text-white py-3 font-bold uppercase tracking-widest text-sm transition-all border-b-4 border-blue-800 active:border-0">Execute_Audit</button>
            </div>
        </section>

        <section class="lg:col-span-2">
            <div id="loading" class="hidden font-mono text-blue-400 animate-pulse">>>
                ANALYZING_DATASET_FOR_BIAS_VECTORS...</div>
            <div id="results" class="hidden space-y-6"></div>
        </section>
    </main>
    <script type="module" src="src/render.js"></script>
</body>

</html>
